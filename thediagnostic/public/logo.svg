<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">
  <!-- Outer pin shape: arc open at upper-right, pointed at bottom -->
  <!-- Large arc from ~2 o'clock going counter-clockwise all the way to point -->
  <path
    d="M148 38 C132 18, 108 8, 82 8 C46 8, 16 38, 16 74 C16 100, 30 122, 52 137 L82 162 L112 137 C134 122, 148 100, 148 74 C148 66, 146 59, 143 52"
    stroke="#3AABDB" stroke-width="8" fill="none"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- The notch/gap - a short arc segment separate from above, the 'open' upper right -->
  <path
    d="M152 32 C158 24, 162 14, 158 6"
    stroke="#3AABDB" stroke-width="8" fill="none"
    stroke-linecap="round"/>

  <!-- Circuit elements inside the pin -->

  <!-- Top node: small solid circle -->
  <circle cx="90" cy="44" r="7" fill="#3AABDB"/>

  <!-- Vertical stem down from top node -->
  <line x1="90" y1="51" x2="90" y2="72" stroke="#3AABDB" stroke-width="5" stroke-linecap="round"/>

  <!-- Curved arc from stem going right to large node -->
  <path d="M90 72 Q104 76, 108 90" stroke="#3AABDB" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Large solid circle (right node) -->
  <circle cx="108" cy="96" r="10" fill="#3AABDB"/>

  <!-- Diagonal probe line: from center going lower-left -->
  <line x1="78" y1="80" x2="50" y2="116" stroke="#3AABDB" stroke-width="5" stroke-linecap="round"/>

  <!-- Small hollow circle at probe tip (lower-left) -->
  <circle cx="50" cy="116" r="6" stroke="#3AABDB" stroke-width="4" fill="none"/>

  <!-- Connection node where probe meets the stem -->
  <circle cx="78" cy="80" r="6" fill="#3AABDB"/>
</svg>
